<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; }

body {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}

#card {
  position: relative;
  width: min(360px, 92vw);
}

#layer-face {
  position: relative;
  width: 100%;
  aspect-ratio: 840 / 1500;
  border-radius: 4px;
  overflow: hidden;
}

#layer-face img {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  transition: opacity 0.04s linear;
}
.f-open   { opacity: 1; z-index: 3; }
.f-half   { opacity: 0; z-index: 2; }
.f-closed { opacity: 0; z-index: 1; }

#layer-mask {
  position: absolute;
  inset: 0;
  border-radius: 4px;
  overflow: hidden;
  z-index: 10;
  pointer-events: none;
  -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 50%, transparent 85%);
  mask-image:         radial-gradient(circle 0px at 50% 50%, black 50%, transparent 85%);
}

#layer-mask img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: top center;
}
</style>

<script>
(function () {
  const card    = document.getElementById('card');
  const mask    = document.getElementById('layer-mask');
  const fOpen   = document.getElementById('f-open');
  const fHalf   = document.getElementById('f-half');
  const fClosed = document.getElementById('f-closed');

  const lerp  = (a, b, t) => a + (b - a) * t;

  let posX = 0, posY = 0;
  let radius  = 0;
  let targetR = 0;
  const RADIUS = 220;

  function tick() {
    radius = lerp(radius, targetR, 0.12);
    const r = Math.max(0, radius);
    mask.style.webkitMaskImage =
      `radial-gradient(circle ${r}px at ${posX}px ${posY}px, black 50%, transparent 85%)`;
    mask.style.maskImage =
      `radial-gradient(circle ${r}px at ${posX}px ${posY}px, black 50%, transparent 85%)`;
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  window.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    posX = e.clientX - rect.left;
    posY = e.clientY - rect.top;
  }, { passive: true });

  card.addEventListener('mouseenter', () => { targetR = RADIUS; });
  card.addEventListener('mouseleave', () => { targetR = 0; });

  /* Blink */
  function showFrame(f) {
    fOpen.style.opacity   = f === 'open'   ? '1' : '0';
    fHalf.style.opacity   = f === 'half'   ? '1' : '0';
    fClosed.style.opacity = f === 'closed' ? '1' : '0';
  }
  function blink() {
    showFrame('half');
    setTimeout(() => showFrame('closed'), 70);
    setTimeout(() => showFrame('half'),   160);
    setTimeout(() => showFrame('open'),   240);
  }
  function scheduleBlink() {
    setTimeout(() => { blink(); scheduleBlink(); }, 2800 + Math.random() * 3200);
  }
  showFrame('open');
  scheduleBlink();
})();
</script>
